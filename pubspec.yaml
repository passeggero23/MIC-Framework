name: mic_app
description: MIC Framework - Flutter TFLite image/audio classification
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.19.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # TensorFlow Lite
  tflite_flutter: ^0.10.4
  
  # Audio Recording (versione stabile senza sealed classes)
  record: ^4.4.4
  
  # Camera
  camera: ^0.10.5+9
  
  # Riverpod per state management
  flutter_riverpod: ^2.4.9
  
  # File system
  path_provider: ^2.1.2
  
  # Permessi
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
