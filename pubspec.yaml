name: mic_app
description: MIC Framework - Flutter TFLite image/audio classification
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  tflite_flutter: ^0.10.4
  record: ^5.0.4
  camera: ^0.10.5+9
  flutter_riverpod: ^2.4.9
  path_provider: ^2.1.2
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
E il workflow va aggiornato:
run: flutter create --platforms=android --project-name mic_app .
