name: mic_app
description: MIC Framework - Flutter TFLite image/audio classification
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  
  # TFLite Core
  tflite_flutter: ^0.10.4
  
  # Audio Recording (FIXED: ^4.4.4 evita sealed classes error)
  record: ^4.4.4
  
  # Camera per image classification
  camera: ^0.10.5+9
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # File System
  path_provider: ^2.1.2
  
  # Permissions (audio/camera)
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
