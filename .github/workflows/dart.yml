name: Flutter Build

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.0"
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Rebuild Android and force minSdk 21
        run: |
          flutter create repair_temp --project-name mic_app --platforms android
          rm -rf android
          mv repair_temp/android .
          rm -rf repair_temp

          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/g' android/app/build.gradle

          sed -i '/android {/a\    aaptOptions { noCompress "tflite" }' android/app/build.gradle

          cat <<EOF >> android/app/build.gradle

          dependencies {
              implementation "org.tensorflow:tensorflow-lite:2.14.0"
              implementation "org.tensorflow:tensorflow-lite-select-tf-ops:2.14.0"
          }
          EOF

      - name: Inject camera permission
        run: |
          sed -i '/<application/i\    <uses-permission android:name="android.permission.CAMERA"/>' android/app/src/main/AndroidManifest.xml

      - name: Get dependencies
        run: flutter pub get

      - name: Clean project
        run: flutter clean

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
