name: Build
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.19.0
      - name: Android Licenses & Prep
        run: |
          # Accetta licenze Android per evitare blocchi a metà build
          yes | sdkmanager --licenses || true
          # Sposta assets se necessario
          if [ -d "lib/assets" ]; then mv lib/assets ./assets; fi
          # Pulisce tutto il vecchio sporco di Gradle
          rm -rf android pubspec.yaml
          flutter create --platforms android --project-name mic_app .
          # Pubspec pulito e aggiornato
          cat <<EOF > pubspec.yaml
          name: mic_app
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            camera: any
            tflite_v2: any
            record: ^5.1.0
            flutter_riverpod: any
          flutter:
            assets:
              - assets/model.tflite
              - assets/labels.txt
          EOF
      - name: Build APK
        run: |
          flutter pub get
          # Il comando magico per ignorare i problemi di icone e procedere
          flutter build apk --release --no-tree-shake-icons
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
