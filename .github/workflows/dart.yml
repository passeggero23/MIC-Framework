name: Flutter Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Manca nel tuo: Java 17 è obbligatorio per Flutter Android builds
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Fix minSdkVersion to 21 (Camera requirement)
        run: |
          # Fix robusto che funziona con build.gradle standard
          sed -i 's/minSdkVersion [0-9]\+/minSdkVersion 21/g' android/app/build.gradle
          sed -i 's/minSdk = [0-9]\+/minSdk = 21/g' android/app/build.gradle.kts 2>/dev/null || true

      - name: Add TensorFlow Lite dependencies
        run: |
          BUILD_FILE="android/app/build.gradle"
          
          # Aggiungi solo se non esistono già
          if ! grep -q "tensorflow-lite" $BUILD_FILE; then
            # Inserisce nel blocco dependencies esistente
            sed -i '/dependencies {/a \    implementation "org.tensorflow:tensorflow-lite:2.14.0"\n    implementation "org.tensorflow:tensorflow-lite-select-tf-ops:2.14.0"' $BUILD_FILE
          fi
          
          # Fix noCompress tflite (evita compressione modelli)
          if ! grep -q 'noCompress "tflite"' $BUILD_FILE; then
            sed -i '/android {/a \    aaptOptions { noCompress "tflite" }' $BUILD_FILE
          fi

      - name: Check Camera Permission
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "android.permission.CAMERA" "$MANIFEST"; then
            sed -i '/<application/i \    <uses-permission android:name="android.permission.CAMERA"/>' "$MANIFEST"
          fi

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
