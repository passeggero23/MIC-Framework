env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

name: Build MIC Framework

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Delete old android folder if exists
        run: rm -rf android/

      - name: Regenerate Android project
        run: flutter create --platforms=android --project-name mic_app .

      - name: Create assets directory
        run: mkdir -p assets/models

      - name: Replace entire AndroidManifest.xml with correct version
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.example.mic_app">
            
            <uses-permission android:name="android.permission.CAMERA" />
            <uses-permission android:name="android.permission.RECORD_AUDIO" />
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
            <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />

            <application
                android:label="mic_app"
                android:name="${applicationName}"
                android:icon="@mipmap/ic_launcher"
                android:allowBackup="false"
                android:theme="@style/LaunchTheme">
                
                <meta-data
                    android:name="flutterEmbedding"
                    android:value="2" />
                
                <activity
                    android:name=".MainActivity"
                    android:exported="true"
                    android:launchMode="singleTop"
                    android:theme="@style/LaunchTheme"
                    android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                    android:hardwareAccelerated="true"
                    android:windowSoftInputMode="adjustResize">
                    <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:resource="@style/NormalTheme" />
                    <meta-data
                        android:name="io.flutter.embedding.android.SplashScreenDrawable"
                        android:resource="@drawable/launch_background" />
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>

            <!-- For Android 11+ -->
            <queries>
                <intent>
                    <action android:name="android.media.action.IMAGE_CAPTURE" />
                </intent>
            </queries>
          </manifest>
          EOF

      - name: Disable R8 in build.gradle
        run: |
          sed -i 's/minifyEnabled true/minifyEnabled false/g' android/app/build.gradle
          sed -i 's/shrinkResources true/shrinkResources false/g' android/app/build.gradle

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK Release
        run: flutter build apk --release --no-tree-shake-icons

      - name: Verify APK exists
        run: |
          echo "📦 Controllo APK generato..."
          ls -la build/app/outputs/flutter-apk/
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            echo "✅ APK trovato!"
            du -h build/app/outputs/flutter-apk/app-release.apk
          else
            echo "❌ APK NON trovato!"
            find build -name "*.apk" 2>/dev/null
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mic-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
