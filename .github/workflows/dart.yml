name: Flutter Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Surgical Repair & No-Compress Rule
        run: |
          # 1. Rigenerazione struttura
          flutter create repair_temp --project-name mic_app --platforms android
          cp -r repair_temp/android .
          rm -rf repair_temp
          
          # 2. Upgrade SDK a 26
          sed -i 's/minSdkVersion .*/minSdkVersion 26/g' android/app/build.gradle
          
          # 3. REGOLA D'ORO: Impedisce la compressione dei modelli TFLite
          # Inseriamo la clausola aaptOptions nel build.gradle
          sed -i '/android {/a \    aaptOptions { noCompress "tflite" }' android/app/build.gradle

      - name: Inject Permissions
        run: |
          sed -i '/<application/i \    <uses-permission android:name="android.permission.CAMERA" />' android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
