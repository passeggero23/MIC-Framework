name: Flutter Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Backup lib and assets
        run: |
          cp -r lib /tmp/lib_backup
          cp -r assets /tmp/assets_backup
          cp pubspec.yaml /tmp/pubspec_backup.yaml

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Regenerate Android folder
        run: |
          rm -rf android
          flutter create . --project-name mic_app --overwrite --platforms android

      - name: Restore original lib and assets
        run: |
          rm -rf lib assets
          cp -r /tmp/lib_backup lib
          cp -r /tmp/assets_backup assets
          cp /tmp/pubspec_backup.yaml pubspec.yaml

      - name: Fix Gradle minSdk
        run: |
          grep -n "minSdk" android/app/build.gradle
          sed -i 's/minSdk [0-9]*/minSdk 21/' android/app/build.gradle
          sed -i 's/minSdkVersion [0-9]*/minSdkVersion 21/' android/app/build.gradle
          grep -n "minSdk" android/app/build.gradle

      - name: Fix AndroidManifest overrideLibrary
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|<manifest xmlns:android="|<manifest xmlns:android=" xmlns:tools="http://schemas.android.com/tools"|' "$MANIFEST"
          sed -i 's|</manifest>|    <uses-sdk tools:overrideLibrary="io.flutter.plugins.camera"/>\n</manifest>|' "$MANIFEST"
          cat "$MANIFEST"

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mic_app_release
          path: build/app/outputs/flutter-apk/app-release.apk
