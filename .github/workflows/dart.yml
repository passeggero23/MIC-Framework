env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Fix permanente per il warning

name: Build MIC Framework

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'  # Versione consigliata per Flutter

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true  # Ottimizzazione build

      # ... (tutti gli altri step rimangono identici al tuo workflow attuale) ...
      # Mantieni esattamente gli stessi step che già funzionano
