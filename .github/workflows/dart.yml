env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

name: Build MIC Framework

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Regenerate Android folder
        run: flutter create --platforms=android --project-name mic_app .

      - name: Restore lib/, pubspec AND AndroidManifest
        run: |
          git checkout -- lib/
          git checkout -- pubspec.yaml
          git checkout -- android/app/src/main/AndroidManifest.xml
          mkdir -p assets/models

      - name: Disable R8 in build.gradle
        run: |
          sed -i 's/minifyEnabled true/minifyEnabled false/g' android/app/build.gradle
          sed -i 's/shrinkResources true/shrinkResources false/g' android/app/build.gradle

      - name: Rewrite gradle.properties
        run: |
          cat > android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx1536M
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

      - name: Create empty proguard-rules.pro
        run: echo "" > android/app/proguard-rules.pro

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK Release
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mic-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
