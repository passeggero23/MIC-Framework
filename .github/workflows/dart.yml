name: Build
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.19.0
      - name: Prep & Fix
        run: |
          # Sposta assets se sono nel posto sbagliato
          if [ -d "lib/assets" ]; then mv lib/assets ./assets; fi
          
          # Rigenera il pubspec con versioni specifiche stabili
          cat <<EOF > pubspec.yaml
          name: mic_app
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            camera: any
            tflite_v2: any
            record: ^5.0.0
            path_provider: any
          flutter:
            assets:
              - assets/model.tflite
              - assets/labels.txt
          EOF
          
          # Crea un main.dart di emergenza se quello attuale ha errori
          mkdir -p lib
          cat <<EOF > lib/main.dart
          import 'package:flutter/material.dart';
          void main() => runApp(MaterialApp(home: Scaffold(body: Center(child: Text("MIC Pronto")))));
          EOF
          
      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
