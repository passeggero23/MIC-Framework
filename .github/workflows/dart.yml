name: Flutter Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Force IA Library Injection
        run: |
          # Ricrea solo la cartella Android
          flutter create repair_temp --project-name mic_app --platforms android
          rm -rf android
          mv repair_temp/android .
          rm -rf repair_temp

          # Imposta minSdkVersion 26
          sed -i 's/minSdkVersion [0-9]\+/minSdkVersion 26/' android/app/build.gradle

          # Aggiungi noCompress per i file .tflite
          sed -i '/android {/a\    aaptOptions {\n        noCompress "tflite"\n    }' android/app/build.gradle

cat <<'EOF' >> android/app/build.gradle
dependencies {
  implementation "org.tensorflow:tensorflow-lite:2.14.0"
  implementation "org.tensorflow:tensorflow-lite-select-tf-ops:2.14.0"
}
EOF

      - name: Inject Camera Permissions
        run: |
          sed -i '/<application/i\    <uses-permission android:name="android.permission.CAMERA"/>' android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
