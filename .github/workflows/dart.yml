name: Build MIC Framework

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'  # Aggiornato da 11 a 17 (richiesto per Flutter 3.19+)

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true  # Aggiunto caching per build più veloci

      - name: Validate Flutter installation
        run: flutter doctor -v

      - name: Regenerate Android project
        run: |
          if [ -d "android" ]; then
            rm -rf android/
          fi
          flutter create --platforms=android --project-name mic_app .

      - name: Restore project files
        run: |
          git restore lib/ pubspec.yaml
          mkdir -p assets/models || true

      # Sezione ottimizzata per la configurazione Android
      - name: Configure Android Build
        working-directory: ./android
        run: |
          # Gradle properties
          echo -e "org.gradle.jvmargs=-Xmx4096M\nandroid.useAndroidX=true" > gradle.properties
          
          # Build.gradle modificato
          awk '{gsub(/minifyEnabled true/, "minifyEnabled false")}1' app/build.gradle > tmp && mv tmp app/build.gradle
          awk '{gsub(/shrinkResources true/, "shrinkResources false")}1' app/build.gradle > tmp && mv tmp app/build.gradle
          touch app/proguard-rules.pro

      - name: Flutter dependencies
        run: |
          flutter pub get
          flutter clean

      - name: Build APK (Release)
        run: flutter build apk --release --no-tree-shake-icons --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mic-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
