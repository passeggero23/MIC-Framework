name: Flutter Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Generate Android project
        run: |
          if [ ! -d "android/app" ]; then
            flutter config --no-analytics
            flutter create --platforms android --project-name mic_app .
          fi

      - name: Configure Android build.gradle
        run: |
          BUILD_FILE="android/app/build.gradle"
          
          # Fix minSdkVersion
          sed -i 's/minSdkVersion [0-9]\+/minSdkVersion 21/g' "$BUILD_FILE"
          
          # Fix noCompress tflite
          if ! grep -q 'noCompress "tflite"' "$BUILD_FILE"; then
            sed -i '/android {/a \    aaptOptions { noCompress "tflite" }' "$BUILD_FILE"
          fi
          
          # Add TensorFlow dependencies (crea blocco dependencies se non esiste)
          if ! grep -q "tensorflow-lite" "$BUILD_FILE"; then
            if grep -q "^dependencies {" "$BUILD_FILE"; then
              # Inserisci prima della chiusura del blocco dependencies
              sed -i '/^dependencies {/,/^}/{ /^}/i\    implementation "org.tensorflow:tensorflow-lite:2.14.0"\n    implementation "org.tensorflow:tensorflow-lite-select-tf-ops:2.14.0"
}' "$BUILD_FILE"
            else
              # Aggiungi blocco nuovo alla fine
              cat >> "$BUILD_FILE" << 'EOF'

dependencies {
    implementation "org.tensorflow:tensorflow-lite:2.14.0"
    implementation "org.tensorflow:tensorflow-lite-select-tf-ops:2.14.0"
}
EOF
            fi
          fi

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
