env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

name: Build MIC Framework

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Delete old android folder if exists
        run: rm -rf android/

      - name: Regenerate Android project
        run: flutter create --platforms=android --project-name mic_app .

      - name: Create assets directory
        run: mkdir -p assets/models

      - name: Insert flutterEmbedding meta-data in AndroidManifest.xml
        run: |
          # Prima aggiungiamo il meta-data flutterEmbedding=2
          sed -i '/<application/a\        <meta-data\n            android:name="flutterEmbedding"\n            android:value="2" />' android/app/src/main/AndroidManifest.xml

      - name: Add camera and microphone permissions
        run: |
          # Aggiungi le permissions subito dopo l'apertura del manifest
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' android/app/src/main/AndroidManifest.xml

          # Aggiungi queries per Android 11+
          sed -i '/<\/application>/a\    <!-- For Android 11+ -->\n    <queries>\n        <intent>\n            <action android:name="android.media.action.IMAGE_CAPTURE" />\n        </intent>\n    </queries>' android/app/src/main/AndroidManifest.xml

      - name: Disable R8 in build.gradle
        run: |
          sed -i 's/minifyEnabled true/minifyEnabled false/g' android/app/build.gradle
          sed -i 's/shrinkResources true/shrinkResources false/g' android/app/build.gradle

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK Release
        run: flutter build apk --release --no-tree-shake-icons

      - name: Verify APK exists
        run: |
          echo "📦 Controllo APK generato..."
          ls -la build/app/outputs/flutter-apk/
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            echo "✅ APK trovato!"
            du -h build/app/outputs/flutter-apk/app-release.apk
          else
            echo "❌ APK NON trovato!"
            find build -name "*.apk" 2>/dev/null
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mic-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
