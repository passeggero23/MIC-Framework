name: Flutter Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Surgical Repair & Flex Delegate Support
        run: |
          # 1. Rigenerazione struttura pulita
          flutter create repair_temp --project-name mic_app --platforms android
          cp -r repair_temp/android .
          rm -rf repair_temp
          
          # 2. Upgrade SDK a 26 per compatibilità IA
          sed -i 's/minSdkVersion .*/minSdkVersion 26/g' android/app/build.gradle
          
          # 3. No-Compress per il file model.tflite
          sed -i '/android {/a \    aaptOptions { noCompress "tflite" }' android/app/build.gradle
          
          # 4. Iniezione librerie Select-Ops (Corretto per log 1000046997)
          # Aggiungiamo le dipendenze in fondo al file build.gradle
          echo 'dependencies { implementation "org.tensorflow:tensorflow-lite-select-tf-ops:2.14.0" }' >> android/app/build.gradle
          echo 'dependencies { implementation "org.tensorflow:tensorflow-lite:2.14.0" }' >> android/app/build.gradle

      - name: Inject Permissions
        run: |
          sed -i '/<application/i \    <uses-permission android:name="android.permission.CAMERA" />' android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
