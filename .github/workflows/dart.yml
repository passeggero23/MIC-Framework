name: Build
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.19.0

      - name: Download Models
        run: |
          mkdir -p assets
          mkdir -p /tmp/mobilenet_extract
          curl -L "https://storage.googleapis.com/download.tensorflow.org/models/mobilenet_v1_2018_08_02/mobilenet_v1_1.0_224_quant.tgz" -o /tmp/mobilenet.tgz
          tar -xzf /tmp/mobilenet.tgz -C /tmp/mobilenet_extract/
          cp /tmp/mobilenet_extract/mobilenet_v1_1.0_224_quant.tflite assets/model_image.tflite
          curl -L "https://storage.googleapis.com/download.tensorflow.org/data/ImageNetLabels.txt" -o assets/labels_image.txt
          curl -L "https://storage.googleapis.com/tfhub-lite-models/google/lite-model/yamnet/classification/tflite/1.tflite" -o assets/model_audio.tflite
          curl -L "https://raw.githubusercontent.com/tensorflow/models/master/research/audioset/yamnet/yamnet_class_map.csv" -o /tmp/yamnet_raw.csv
          tail -n +2 /tmp/yamnet_raw.csv | cut -d',' -f3 | tr -d '"' > assets/labels_audio.txt
          ls -lh assets/

      - name: Regenerate Android Project
        run: |
          rm -rf android
          flutter create --platforms android .
          
      - name: Fix Android Config
        run: |
          python3 << 'EOF'
          import re

          with open('android/app/build.gradle', 'r') as f:
              c = f.read()
          c = re.sub(r'minSdk\s*=\s*\S+', 'minSdk = 21', c)
          c = re.sub(r'minSdkVersion\s+\S+', 'minSdkVersion 21', c)
          with open('android/app/build.gradle', 'w') as f:
              f.write(c)

          with open('android/app/src/main/AndroidManifest.xml', 'r') as f:
              m = f.read()
          if 'CAMERA' not in m:
              m = m.replace(
                  '<application',
                  '    <uses-permission android:name="android.permission.CAMERA" />\n'
                  '    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n'
                  '    <application',
                  1
              )
          with open('android/app/src/main/AndroidManifest.xml', 'w') as f:
              f.write(m)
          EOF

      - name: Copy Dart Sources
        run: |
          cp -r lib/* /tmp/lib_backup/ 2>/dev/null || true

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/o
