name: Flutter Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Surgical Repair
        run: |
          # 1. Creiamo un progetto pulito a fianco
          flutter create repair_temp --project-name mic_app --platforms android
          
          # 2. Spostiamo la cartella android nel tuo repository
          cp -r repair_temp/android .
          
          # 3. Pulizia
          rm -rf repair_temp

      - name: Inject Permissions
        run: |
          # Inseriamo il permesso fotocamera nel posto corretto
          sed -i '/<application/i \    <uses-permission android:name="android.permission.CAMERA" />' android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
