name: Flutter Build

on:name: Flutter Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Generate Android project
        run: |
          if [ ! -d "android/app" ]; then
            flutter config --no-analytics
            flutter create --platforms android --project-name mic_app .
          fi

      - name: Fix minSdkVersion to 21
        run: |
          sed -i 's/minSdkVersion [0-9]\+/minSdkVersion 21/g' android/app/build.gradle

      - name: Add TensorFlow Lite dependencies
        run: |
          echo "" >> android/app/build.gradle
          echo "dependencies {" >> android/app/build.gradle
          echo '    implementation "org.tensorflow:tensorflow-lite:2.14.0"' >> android/app/build.gradle
          echo '    implementation "org.tensorflow:tensorflow-lite-select-tf-ops:2.14.0"' >> android/app/build.gradle
          echo "}" >> android/app/build.gradle

      - name: Add noCompress for tflite
        run: |
          if ! grep -q 'noCompress "tflite"' android/app/build.gradle; then
            sed -i '/^android {/a \    aaptOptions { noCompress "tflite" }' android/app/build.gradle
          fi

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk

  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Generate Android project
        run: |
          if [ ! -d "android/app" ]; then
            flutter config --no-analytics
            flutter create --platforms android --project-name mic_app .
          fi

      - name: Fix minSdkVersion to 21
        run: |
          sed -i 's/minSdkVersion [0-9]\+/minSdkVersion 21/g' android/app/build.gradle

      - name: Add TensorFlow Lite dependencies
        run: |
          # Aggiungi dipendenze alla fine del file, fuori da altri blocchi
          echo "" >> android/app/build.gradle
          echo "dependencies {" >> android/app/build.gradle
          echo '    implementation "org.tensorflow:tensorflow-lite:2.14.0"' >> android/app/build.gradle
          echo '    implementation "org.tensorflow:tensorflow-lite-select-tf-ops:2.14.0"' >> android/app/build.gradle
          echo "}" >> android/app/build.gradle

      - name: Add noCompress for tflite
        run: |
          # Aggiungi aaptOptions dentro il blocco android se non esiste
          if ! grep -q 'noCompress "tflite"' android/app/build.gradle; then
            # Sostituisci la riga 'android {' con 'android { aaptOptions... }'
            # Ma meglio usare sed per inserire dopo 'android {'
            sed -i '/^android {/a \    aaptOptions { noCompress "tflite" }' android/app/build.gradle
          fi

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
