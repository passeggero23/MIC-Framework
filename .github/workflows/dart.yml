on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Regenerate Android folder
        run: flutter create --platforms=android --project-name mic_app .

      - name: Restore lib/ and pubspec
        run: |
          git checkout -- lib/
          git checkout -- pubspec.yaml

      - name: Fix Gradle inline
        run: |
          sed -i 's/flutter.minSdkVersion/26/' android/app/build.gradle
          sed -i 's/flutter.compileSdkVersion/34/' android/app/build.gradle
          sed -i 's/flutter.targetSdkVersion/34/' android/app/build.gradle
          sed -i "s/ext.kotlin_version = .*/ext.kotlin_version = '1.9.22'/" android/build.gradle

      - name: Fix AndroidManifest permissions
        run: |
          sed -i 's|<application|<uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.CAMERA"/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\n    <application|' android/app/src/main/AndroidManifest.xml

      - name: Fix R8 sealed classes
        run: |
          echo '-keep class * extends java.lang.Enum { *; }' >> android/app/proguard-rules.pro
          echo '-dontwarn com.llfbandit.record.**' >> android/app/proguard-rules.pro
          echo '-keep class com.llfbandit.record.** { *; }' >> android/app/proguard-rules.pro

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK Release
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-a
